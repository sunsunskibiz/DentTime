# ============================================================
# DentTime — Unified Compose
# Usage:
#   make up          → start everything (demo)
#   make up-train    → start Airflow + MLflow only
#   make up-serve    → start web app + monitoring only
#   make down        → stop everything
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: 'denttime-local-dev-secret'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    MLFLOW_TRACKING_URI: http://mlflow:5000
  volumes:
    - ./:/opt/airflow/project
    - ./airflow/dags:/opt/airflow/dags
    - ./data/raw:/opt/airflow/data/raw:ro
    - denttime-interim:/opt/airflow/data/interim
    - denttime-dvc-store:/opt/airflow/dvc-store
    - mlflow-artifacts:/mlflow/artifacts
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_healthy
  profiles: [training]

services:
  # ── Training profile ───────────────────────────────────────
  postgres:
    image: postgres:15
    profiles: [training]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
      start_period: 30s

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    profiles: [training]
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://airflow:airflow@postgres/mlflow
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts '*'
    ports:
      - "5008:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    user: root
    command:
      - bash
      - -c
      - |
          set -e
          chown -R 50000:0 /opt/airflow/data/interim /opt/airflow/dvc-store
          chown -R 50000:0 /opt/airflow/data/interim /opt/airflow/dvc-store /mlflow/artifacts
          su -s /bin/bash airflow -c '
            set -e
            airflow db migrate
            airflow users list | grep -q admin || \
              airflow users create \
                --username admin --password admin \
                --role Admin \
                --email admin@denttime.local \
                --firstname Admin --lastname Admin
            cd /opt/airflow/project && \
              (dvc remote add -d localremote /opt/airflow/dvc-store --local --force \
               || echo "DVC remote setup skipped")
          '
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 3
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Serving profile ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    profiles: [serving]
    container_name: denttime_api
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./src/features/artifacts:/app/src/features/artifacts
      - ./monitoring:/app/monitoring
      - denttime-dvc-store:/opt/airflow/dvc-store

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [serving]
    container_name: denttime_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [serving]
    container_name: denttime_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

  metrics_updater:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    profiles: [serving]
    container_name: denttime_metrics_updater
    command: python run_metrics_loop.py
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./src/features/artifacts:/app/src/features/artifacts
      - ./monitoring:/app/monitoring
    depends_on:
      - api

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    profiles: [serving]
    container_name: denttime_frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8001

volumes:
  postgres-db:
  denttime-interim:
  denttime-dvc-store:
  mlflow-artifacts:
