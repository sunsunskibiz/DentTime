services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: denttime-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts:ro
      - ./monitoring:/app/monitoring
      - ./smoke_test_integration.py:/app/smoke_test_integration.py:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: denttime-frontend
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

  metrics_updater:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: denttime-api
    command: python run_metrics_loop.py
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts:ro
      - ./monitoring:/app/monitoring
    depends_on:
      api:
        condition: service_healthy
