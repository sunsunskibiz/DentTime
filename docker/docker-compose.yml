version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: 'denttime-local-dev-secret'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  volumes:
    - ../:/opt/airflow/project
    - ../airflow/dags:/opt/airflow/dags
    - "../data/raw:/opt/airflow/data/raw:ro"
    - denttime-interim:/opt/airflow/data/interim
    - denttime-dvc-store:/opt/airflow/dvc-store
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
      start_period: 30s

  airflow-init:
    <<: *airflow-common
    user: root
    command:
      - bash
      - -c
      - |
          set -e
          chown -R 50000:0 /opt/airflow/data/interim /opt/airflow/dvc-store
          su -s /bin/bash airflow -c 'set -e; airflow db migrate; airflow users list | grep -q admin || airflow users create --username admin --password admin --role Admin --email admin@example.com --firstname Admin --lastname Admin; cd /opt/airflow/project && (dvc remote add -d localremote /opt/airflow/dvc-store --local --force || echo "DVC remote setup skipped")'
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 3
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db:
  denttime-interim:
  denttime-dvc-store:
