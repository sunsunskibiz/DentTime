services:
  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.backend
    container_name: denttime_api
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data
      - ../../artifacts:/app/artifacts
      - ../../src/features/artifacts:/app/src/features/artifacts
      - ../../monitoring:/app/monitoring

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: denttime_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    container_name: denttime_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      
  metrics_updater:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.backend
    container_name: denttime_metrics_updater
    command: python run_metrics_loop.py
    volumes:
      - ../../data:/app/data
      - ../../artifacts:/app/artifacts
      - ../../src/features/artifacts:/app/src/features/artifacts
      - ../../monitoring:/app/monitoring
    depends_on:
      - api

  frontend:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.frontend
    container_name: denttime_frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000